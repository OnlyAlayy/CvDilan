<!DOCTYPE html>
<html lang="es" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Dilan Agustin Berriel Cardozo</title>
  <link rel="icon" type="image/png" href="logopaginas.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Raleway:wght@300;600;800&display=swap"
    rel="stylesheet">

  <!-- Libraries -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      /* Dark Theme (Default) */
      --bg-color: #0a0a0f;
      --sidebar-bg: #111118;
      --accent: #c9a84c;
      --text-main: #f0f0f0;
      --text-muted: #a0a0ab;
      --shadow-color: rgba(0, 0, 0, 0.5);
      --border-color: rgba(201, 168, 76, 0.1);
    }

    :root.light {
      /* Light Theme */
      --bg-color: #f5f2ee;
      --sidebar-bg: #eae5dc;
      --accent: #c9a84c;
      --text-main: #1a1a1a;
      --text-muted: #5a5a6a;
      --shadow-color: rgba(0, 0, 0, 0.05);
      --border-color: rgba(201, 168, 76, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'DM Sans', sans-serif;
      transition: background-color 0.4s ease, color 0.4s ease;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    h1,
    h2,
    h3,
    h4,
    .title {
      font-family: 'Raleway', sans-serif;
    }

    .cv-container {
      display: flex;
      flex-wrap: wrap;
      max-width: 1200px;
      margin: 40px auto;
      min-height: 90vh;
      box-shadow: 0 25px 50px -12px var(--shadow-color);
      border-radius: 24px;
      overflow: hidden;
      background-color: var(--bg-color);
      transition: background-color 0.4s ease;
      position: relative;
    }

    .full-width-section {
      width: 100%;
      padding: 40px 60px 50px;
      background-color: var(--bg-color);
      border-top: 1px solid var(--border-color);
    }

    .sidebar {
      width: 32%;
      background-color: var(--sidebar-bg);
      color: #f0f0f0;
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      gap: 40px;
      position: relative;
      z-index: 10;
    }

    .light .sidebar {
      color: #1a1a1a;
    }

    .light .info-item {
      color: #3a3a4a;
    }

    .light .info-item:hover {
      color: #1a1a1a;
    }

    .main-content {
      width: 68%;
      padding: 60px 80px;
      display: flex;
      flex-direction: column;
      gap: 50px;
      position: relative;
    }

    /* Foto con borde dorado giratorio */
    .profile-wrapper {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .profile-wrapper:hover {
      transform: scale(1.05) !important;
    }

    .profile-border {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 0%, var(--accent) 50%, transparent 100%);
      animation: rotateBorder 4s linear infinite;
    }

    .profile-inner {
      position: absolute;
      inset: 0;
      background-color: var(--sidebar-bg);
      border-radius: 50%;
      border: 3px solid var(--sidebar-bg);
    }

    @keyframes rotateBorder {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background-color: var(--border-color);
    }

    .sidebar .section-title::after {
      background-color: rgba(201, 168, 76, 0.2);
    }

    .info-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .info-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 0.95rem;
      font-weight: 400;
      color: #d0d0d8;
      line-height: 1.5;
      transition: color 0.3s ease, transform 0.3s ease;
      cursor: default;
    }

    .info-item:hover {
      color: #ffffff;
      transform: translateX(5px) !important;
    }

    .info-item svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* Skills as Tags */
    .skills-container {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
    }

    .skill-tag {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(201, 168, 76, 0.4);
      color: var(--text-main);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .skill-tag:hover {
      background-color: var(--accent);
      color: #000;
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(201, 168, 76, 0.3);
    }

    /* Portfolio Gallery */
    .gallery-masonry {
      column-count: 3;
      column-gap: 20px;
    }

    @media (max-width: 900px) {
      .gallery-masonry {
        column-count: 2;
      }
    }

    @media (max-width: 500px) {
      .gallery-masonry {
        column-count: 1;
      }
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 20px;
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .gallery-item img:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 24px rgba(201, 168, 76, 0.2);
    }

    /* Header Main */
    .name {
      font-size: 3.5rem;
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .name strong {
      font-weight: 800;
    }

    .profession {
      font-size: 1.1rem;
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .profile-text {
      color: var(--text-muted);
      line-height: 1.8;
      font-weight: 400;
      font-size: 1.05rem;
      max-width: 95%;
      margin-top: 20px;
      transition: color 0.4s ease;
    }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: 30px;
      margin-top: 10px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 1px;
      height: 100%;
      background: linear-gradient(to bottom, var(--accent) 0%, rgba(201, 168, 76, 0.1) 100%);
    }

    .timeline-item {
      position: relative;
      margin-bottom: 35px;
      padding: 24px 30px;
      border-radius: 12px;
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: default;
    }

    .timeline-item:hover {
      transform: translateY(-5px) scale(1.02) !important;
      background-color: rgba(255, 255, 255, 0.05);
      border-color: rgba(201, 168, 76, 0.5);
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5), 0 0 15px rgba(201, 168, 76, 0.2);
    }

    .light .timeline-item {
      background-color: #ffffff;
    }

    .light .timeline-item:hover {
      background-color: #fafafa;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1), 0 0 15px rgba(201, 168, 76, 0.3);
    }

    .timeline-dot {
      position: absolute;
      left: -35.5px;
      top: 30px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: var(--accent);
      border: 3px solid var(--bg-color);
      box-shadow: 0 0 0 2px var(--accent);
      transition: border-color 0.4s ease;
    }

    .timeline-date {
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .timeline-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-main);
    }

    .timeline-subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .timeline-desc {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-muted);
    }

    /* Expandable Item Styles */
    .expandable-trigger {
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .expandable-icon {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: var(--accent);
      stroke-width: 2.5;
      transition: transform 0.3s ease;
    }

    .expandable-content {
      overflow: hidden;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(201, 168, 76, 0.15);
    }

    .sub-item {
      margin-bottom: 20px;
      padding-left: 15px;
      border-left: 2px solid rgba(201, 168, 76, 0.2);
    }

    .sub-item:last-child {
      margin-bottom: 0;
    }

    .sub-item-date {
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 2px;
    }

    .sub-item-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .sub-item-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* Actions */
    .actions-container {
      position: absolute;
      top: 30px;
      right: 30px;
      display: flex;
      gap: 15px;
      z-index: 100;
      opacity: 0;
      /* Animated in react */
    }

    .icon-button {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-main);
      transition: all 0.3s ease;
    }

    .light .icon-button {
      background: #fff;
    }

    .icon-button:hover {
      background: var(--accent);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(201, 168, 76, 0.3);
    }

    .icon-button svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* Print/PDF mode */
    @page {
      margin: 0;
    }

    @media print {
      body {
        margin: 0;
        background-color: var(--bg-color) !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .cv-container {
        box-shadow: none !important;
        margin: 0 !important;
        border-radius: 0 !important;
        max-width: none !important;
      }

      .actions-container {
        display: none !important;
      }
    }

    /* Custom PDF class for html2canvas */
    .pdf-render {
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
      transform: none !important;
    }

    /* Creator Watermark */
    .creator-watermark {
      position: fixed;
      bottom: 22px;
      right: 22px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0.55;
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: auto;
    }

    .creator-watermark:hover {
      opacity: 1;
      transform: translateY(-3px);
    }

    .creator-signature {
      height: 36px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.45));
    }

    .creator-socials {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .creator-social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .creator-social-link:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.15);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
    }

    .creator-social-link svg {
      width: 16px;
      height: 16px;
    }

    @media print {
      .creator-watermark {
        display: none !important;
      }
    }

    /* --- Responsive Styles --- */
    @media (max-width: 992px) {

      /* Mobile Reordering Logic */
      .cv-container {
        display: flex;
        flex-direction: column;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        order: 1;
      }

      .main-content {
        order: 2;
        /* Professional Experience comes after profile/contact */
      }

      .full-width-section {
        order: 3;
      }

      /* Specific Sidebar segments */
      .sidebar>.profile-wrapper {
        order: 1;
      }

      .sidebar>.header-mobile {
        order: 2;
      }

      .sidebar>.info-list {
        order: 3;
      }

      /* Contact info */
      .sidebar>div:not(.profile-wrapper):not(.header-mobile):not(.info-list) {
        order: 4;
      }

      /* Skills... */

      .cv-container {
        margin: 20px;
        flex-direction: column;
        border-radius: 16px;
      }

      .sidebar {
        width: 100%;
        padding: 40px 30px;
        gap: 20px;
        text-align: center;
      }

      .main-content {
        width: 100%;
        padding: 40px 30px;
        gap: 40px;
      }

      .profile-wrapper {
        width: 160px;
        height: 160px;
        margin: 0 auto 10px auto;
      }

      .header-desktop {
        display: none !important;
      }

      .header-mobile {
        display: block !important;
        margin-top: 10px;
        text-align: center;
      }

      .name {
        font-size: 2.2rem;
        text-align: center;
      }

      .profession {
        font-size: 0.9rem;
        letter-spacing: 2px;
        text-align: center;
        margin-top: 8px;
      }

      .profile-text {
        text-align: center;
        margin: 15px auto 0;
        max-width: 100%;
      }

      .full-width-section {
        padding: 30px 20px;
      }

      .actions-container {
        top: 15px;
        right: 15px;
        gap: 10px;
      }

      .icon-button {
        width: 38px;
        height: 38px;
      }

      .icon-button svg {
        width: 18px;
        height: 18px;
      }
    }

    .header-mobile {
      display: none;
    }

    .header-desktop {
      display: block;
    }

    @media (max-width: 600px) {
      .cv-container {
        margin: 10px;
        border-radius: 12px;
      }

      .name {
        font-size: 1.8rem;
      }

      .profile-text {
        font-size: 0.95rem;
      }

      .timeline-item {
        padding: 20px;
      }

      .timeline-dot {
        left: -32.5px;
      }

      .creator-watermark {
        bottom: 15px;
        right: 15px;
        scale: 0.8;
      }
    }

    /* PDF Generation Overlay */
    .pdf-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      letter-spacing: 1px;
    }
  </style>
</head>

    const TimelineItem = ({ exp, itemVariants, forceExpand }) => {

    // --- App ---
    const App = () => {
      const [isDark, setIsDark] = useState(true);
      const [isGenerating, setIsGenerating] = useState(false);
      const cvRef = useRef(null);

      useEffect(() => {
        if (isDark) {
          document.documentElement.classList.remove('light');
        } else {
          document.documentElement.classList.add('light');
        }
      }, [isDark]);

      const toggleTheme = () => setIsDark(!isDark);

      const downloadPDF = async () => {
        setIsGenerating(true);
        // Esperamos un momento para que React procese isGenerating y las animaciones terminen
        await new Promise(resolve => setTimeout(resolve, 1500));

        const element = cvRef.current;
        if (!element) {
          setIsGenerating(false);
          return;
        }

        try {
          // Aseguramos que estamos al inicio para la captura
          window.scrollTo(0, 0);

          // Forzamos un ancho de escritorio temporal
          const originalStyle = element.getAttribute('style') || '';
          element.style.width = '1140px';
          element.style.maxWidth = 'none';
          element.style.borderRadius = '0';

          // Escala menor en celulares para no colapsar la RAM
          const isMobile = window.innerWidth < 768;

          const canvas = await html2canvas(element, {
            scale: isMobile ? 1.5 : 2,
            useCORS: true,
            allowTaint: false,
            backgroundColor: isDark ? '#0a0a0f' : '#f5f2ee',
            logging: false,
            windowWidth: 1140,
            onclone: (clonedDoc) => {
              const clonedEl = clonedDoc.querySelector('.cv-container');
              if (clonedEl) {
                clonedEl.style.width = '1140px';
                clonedEl.style.maxWidth = 'none';
                clonedEl.style.borderRadius = '0';
              }
            }
          });

          // Restaurar estilo antes de seguir
          element.setAttribute('style', originalStyle);

          const imgData = canvas.toDataURL('image/jpeg', 0.95);
          const { jsPDF } = window.jspdf;

          const pdf = new jsPDF({
            orientation: 'p',
            unit: 'px',
            format: 'a4',
            hotfixes: ["px_scaling"]
          });

          const pageWidth = pdf.internal.pageSize.getWidth();
          const pageHeight = pdf.internal.pageSize.getHeight();
          const imgWidth = pageWidth;
          const imgHeight = (canvas.height * imgWidth) / canvas.width;

          // Sistema de páginas múltiples para evitar contenido cortado si el CV es muy largo
          let heightLeft = imgHeight;
          let position = 0;

          pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
          heightLeft -= pageHeight;

          // Añadir nuevas páginas si el lienzo es más largo que una hoja A4
          while (heightLeft > 0) {
            position = heightLeft - imgHeight;
            pdf.addPage();
            pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
            heightLeft -= pageHeight;
          }

          pdf.save(`CV_Dilan_Berriel_${new Date().toLocaleDateString().replace(/\//g, '-')}.pdf`);

        } catch (error) {
          console.error("Error al generar PDF:", error);
          alert("Error: Si abriste el archivo con doble clic (file://), el navegador bloquea la descarga de las imágenes por seguridad. Usa Live Server en VSCode, o simplemente súbelo a producción y funcionará perfecto.");
        } finally {
          setIsGenerating(false);
        }
      };

      return (
        <>
          <AnimatePresence>
            {isGenerating && (
              <motion.div
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                className="pdf-overlay"
              >
                <div style={{ textAlign: 'center' }}>
                  <motion.div
                    animate={{ rotate: 360 }}
                    transition={{ repeat: Infinity, duration: 1, ease: "linear" }}
                    style={{ fontSize: '2rem', marginBottom: '10px' }}
                  >
                    <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round">
                      <line x1="12" y1="2" x2="12" y2="6"></line>
                      <line x1="12" y1="18" x2="12" y2="22"></line>
                      <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
                      <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
                      <line x1="2" y1="12" x2="6" y2="12"></line>
                      <line x1="18" y1="12" x2="22" y2="12"></line>
                      <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
                      <line x1="16.24" y1="4.93" x2="19.07" y2="7.76"></line>
                    </svg>
                  </motion.div>
                  Generando tu CV...
                </div>
              </motion.div>
            )}
          </AnimatePresence>

          <motion.div
            initial={{ opacity: 0, y: 40 }}
            animate={{ opacity: 1, y: 0 }}
            transition={{ duration: 0.8, ease: "easeOut" }}
            className="cv-container"
            ref={cvRef}

              animate={{ opacity: 1 }}
              transition={{ delay: 1, duration: 0.5 }}
              data-html2canvas-ignore="true"

                <AnimatePresence mode="wait">
                  <motion.div
                    key={isDark ? "dark" : "light"}
                    initial={{ rotate: -90, opacity: 0 }}
                    animate={{ rotate: 0, opacity: 1 }}
                    exit={{ rotate: 90, opacity: 0 }}

                </AnimatePresence>

              </button>
            </motion.div>

            <Sidebar />
            <MainContent isGenerating={isGenerating} />
            <PortfolioSection />
            <CreatorWatermark />
          </motion.div>
        </>
      );
    }

          >

                </linearGradient>

          </a>
          {/* TikTok */}
          <a
            href="https://www.tiktok.com/@alaydev?_r=1&_t=ZS-954TvKctxc0"
            target="_blank"
            rel="noreferrer"
            className="creator-social-link"
            title="TikTok @alaydev"
          >
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z" fill="#ffffff" />
            </svg>
          </a>
        </div>
      </div>
    );

    const rootNode = document.getElementById('root');
    const root = ReactDOM.createRoot(rootNode);
    root.render(<App />);
  </script>
